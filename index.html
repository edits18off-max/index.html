<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAN 18 | Elite Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --accent: #ff0000; --bg: #000000; --card: #111111; --text: #ffffff; }
        .theme-light { --accent: #ff0000; --bg: #ffffff; --card: #f4f4f4; --text: #000000; }
        .theme-red { --accent: #ffffff; --bg: #7f0000; --card: #990000; --text: #ffffff; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .logo-box { background: #000; padding: 4px 12px; border-radius: 8px; border: 1px solid #333; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        #map { height: 200px; border-radius: 1.5rem; width: 100%; border: 1px solid var(--accent); }
        .nav-btn { transition: all 0.2s; opacity: 0.3; }
        .nav-active { opacity: 1; color: var(--accent); transform: translateY(-4px); }
        .ai-float { position: fixed; bottom: 100px; right: 20px; z-index: 1000; }
        .delta-pos { color: #ff4444; } .delta-neg { color: #44ff44; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-inherit z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="logo-box"><span class="text-red-600 font-black text-xl italic">18</span></div>
            <h1 class="text-xl font-black tracking-tighter uppercase">MAN 18</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="h-2 w-2 rounded-full bg-red-600 animate-ping"></div>
            <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Live</span>
        </div>
    </header>

    <main id="app-content" class="p-4 space-y-6"></main>

    <div class="ai-float">
        <button onclick="toggleAI()" class="h-14 w-14 rounded-full bg-red-600 text-white flex items-center justify-center shadow-2xl shadow-red-600/20">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        </button>
    </div>

    <div id="ai-window" class="fixed inset-x-4 bottom-28 glass p-5 rounded-[2rem] hidden z-[1001] h-[50vh] flex flex-col">
        <div id="ai-chat" class="flex-1 overflow-y-auto text-xs space-y-4 mb-3 pr-2 scrollbar-hide">
            <div class="bg-white/5 p-4 rounded-xl border-l-2 border-red-600 uppercase font-bold text-[10px]">Neural Link: Proportions Analysis Ready.</div>
        </div>
        <div class="flex gap-2 bg-black/40 p-2 rounded-xl">
            <input type="text" id="ai-input" class="flex-1 bg-transparent p-2 text-sm outline-none" placeholder="Query MAN 18 AI...">
            <button onclick="askAI()" class="bg-red-600 text-white px-4 rounded-lg font-bold">↑</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 glass border-t border-white/5 flex justify-around items-center px-4 z-[999] backdrop-blur-2xl">
        <button onclick="render('track')" id="btn-track" class="nav-btn flex flex-col items-center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></button>
        <button onclick="render('diet')" id="btn-diet" class="nav-btn flex flex-col items-center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/></svg></button>
        <button onclick="render('metrics')" id="btn-metrics" class="nav-btn flex flex-col items-center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg></button>
        <button onclick="render('settings')" id="btn-settings" class="nav-btn flex flex-col items-center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="m19.4 15 .33 1.82"/></svg></button>
    </nav>

    <script>
        let state = {
            theme: localStorage.getItem('theme') || 'dark',
            stats: JSON.parse(localStorage.getItem('stats')) || { weight: 69, height: 163, chest: 90, waist: 84, hips: 104, biceps: 30 },
            targets: { weight: 60, chest: 96, waist: 76, hips: 92, biceps: 34 }
        };

        function render(page) {
            const content = document.getElementById('app-content');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(`btn-${page}`).classList.add('nav-active');

            if (page === 'metrics') {
                content.innerHTML = `
                    <div class="glass p-6 rounded-[2rem] space-y-6">
                        <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-red-600">Metric Evolution</h3>
                        <div class="space-y-4">
                            ${Object.keys(state.stats).map(key => {
                                const delta = (state.stats[key] - state.targets[key]).toFixed(1);
                                const isPos = delta > 0;
                                return `
                                    <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl">
                                        <div><p class="text-[10px] opacity-40 uppercase">${key}</p><p class="text-xl font-bold">${state.stats[key]}<span class="text-xs opacity-50 ml-1">cm/kg</span></p></div>
                                        <div class="text-right"><p class="text-[10px] opacity-40 uppercase font-bold">Target: ${state.targets[key]}</p>
                                        <p class="text-xs font-bold ${isPos ? 'text-red-500' : 'text-green-500'}">${isPos ? '+' : ''}${delta}</p></div>
                                    </div>`;
                            }).join('')}
                        </div>
                        <button onclick="editMetrics()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Update Data</button>
                    </div>
                `;
            } else if (page === 'track') {
                content.innerHTML = `<div class="glass p-6 rounded-[2rem] space-y-4"><div id="map"></div><button class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold">START SESSION</button></div>`;
                setTimeout(() => {
                    const map = L.map('map', {zoomControl: false}).setView([11.0168, 76.9558], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                }, 100);
            } else if (page === 'settings') {
                content.innerHTML = `
                    <div class="glass p-6 rounded-[2rem] space-y-6">
                        <h3 class="text-[10px] font-bold uppercase tracking-widest opacity-50 text-center">System Aesthetic</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setTheme('dark')" class="p-4 bg-black border border-white/10 rounded-xl text-[10px] font-bold">DARK</button>
                            <button onclick="setTheme('light')" class="p-4 bg-white text-black rounded-xl text-[10px] font-bold">LIGHT</button>
                            <button onclick="setTheme('red')" class="p-4 bg-red-800 text-white rounded-xl text-[10px] font-bold">RED</button>
                        </div>
                    </div>
                `;
            }
        }

        function setTheme(t) { document.body.className = `pb-32 theme-${t}`; localStorage.setItem('theme', t); }
        function toggleAI() { document.getElementById('ai-window').classList.toggle('hidden'); }
        function editMetrics() {
            const newWeight = prompt("Enter Current Weight (kg):", state.stats.weight);
            if(newWeight) {
                state.stats.weight = parseFloat(newWeight);
                localStorage.setItem('stats', JSON.stringify(state.stats));
                render('metrics');
            }
        }

        setTheme(state.theme);
        render('metrics');
    </script>
</body>
</html>
